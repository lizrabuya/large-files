steps:
  - label: "test minimal/default git lfs operation"
    command: ./test_git_lfs_checkout.sh . test_minimal_operation
    plugins:
      - improbable-eng/metahook#v0.4.1:
          environment: |
            buildkite-agent env set "GIT_LFS_SKIP_SMUDGE=1"
          post-checkout: |
            echo "--- git lfs fetch + git lfs checkout"
            cd $${BUILDKITE_BUILD_CHECKOUT_PATH}
            git lfs install --local
            git lfs fetch origin "refs/remotes/origin/$${BUILDKITE_BRANCH}"
            git lfs checkout

  - label: "test git lfs fetch with include and exclude filters"
    command: ./test_git_lfs_checkout.sh . test_fetch_include_exclude_checkout
    plugins:
      - improbable-eng/metahook#v0.4.1:
          environment: |
            buildkite-agent env set "GIT_LFS_SKIP_SMUDGE=1"
          post-checkout: |
            echo "--- git lfs fetch + git lfs checkout"
            cd $${BUILDKITE_BUILD_CHECKOUT_PATH}
            git lfs install --local
            git lfs fetch --include="bin/**" --exclude="src/**"
            git lfs checkout

  - label: "test git lfs prune"
    command: ./test_git_lfs_checkout.sh . test_git_lfs_prune
    plugins:
      - improbable-eng/metahook#v0.4.1:
          environment: |
            buildkite-agent env set "GIT_LFS_SKIP_SMUDGE=1"
          post-checkout: |
            echo "--- git lfs fetch + git lfs checkout"
            cd $${BUILDKITE_BUILD_CHECKOUT_PATH}
            git lfs install --local
            git lfs fetch
            git lfs checkout

  - label: "test lfs disabled — BUILDKITE_GIT_LFS_ENABLED absent"
    command: ./test_git_lfs_checkout.sh . test_lfs_disabled_absent

  - label: "test lfs disabled — BUILDKITE_GIT_LFS_ENABLED=false"
    command: ./test_git_lfs_checkout.sh . test_lfs_disabled_false
    env:
      BUILDKITE_GIT_LFS_ENABLED: "false"

  - label: "test git-lfs binary absent from PATH"
    command: ./test_git_lfs_checkout.sh . test_binary_not_found
    plugins:
      - improbable-eng/metahook#v0.4.1:
          environment: |
            buildkite-agent env set "GIT_LFS_SKIP_SMUDGE=1"
          post-checkout: |
            echo "--- git lfs fetch + git lfs checkout"
            cd $${BUILDKITE_BUILD_CHECKOUT_PATH}
            git lfs install --local
            git lfs fetch
            git lfs checkout

  - label: "test GIT_LFS_SKIP_SMUDGE=1 produces pointer files at checkout"
    command: ./test_git_lfs_checkout.sh . test_skip_smudge_checkout
    plugins:
      - improbable-eng/metahook#v0.4.1:
          environment: |
            buildkite-agent env set "GIT_LFS_SKIP_SMUDGE=1"
          post-checkout: |
            echo "--- git lfs fetch + git lfs checkout"
            cd $${BUILDKITE_BUILD_CHECKOUT_PATH}
            git lfs install --local
            git lfs fetch
            git lfs checkout

  - label: "test GIT_LFS_SKIP_SMUDGE=1 overrides pre-existing =0"
    command: ./test_git_lfs_checkout.sh . test_skip_smudge_env_override
    plugins:
      - improbable-eng/metahook#v0.4.1:
          environment: |
            buildkite-agent env set "GIT_LFS_SKIP_SMUDGE=1"
          post-checkout: |
            echo "--- git lfs fetch + git lfs checkout"
            cd $${BUILDKITE_BUILD_CHECKOUT_PATH}
            git lfs install --local
            git lfs fetch
            git lfs checkout

  - label: "test invalid glob in fetch include/exclude fails build"
    command: ./test_git_lfs_checkout.sh . test_invalid_glob_fails
    plugins:
      - improbable-eng/metahook#v0.4.1:
          environment: |
            buildkite-agent env set "GIT_LFS_SKIP_SMUDGE=1"
          post-checkout: |
            echo "--- git lfs install only (fetch skipped — test asserts it fails)"
            cd $${BUILDKITE_BUILD_CHECKOUT_PATH}
            git lfs install --local

  - label: "test git lfs checkout uses local cache only"
    command: ./test_git_lfs_checkout.sh . test_checkout_local_cache
    plugins:
      - improbable-eng/metahook#v0.4.1:
          environment: |
            buildkite-agent env set "GIT_LFS_SKIP_SMUDGE=1"
          post-checkout: |
            echo "--- git lfs fetch + git lfs checkout"
            cd $${BUILDKITE_BUILD_CHECKOUT_PATH}
            git lfs install --local
            git lfs fetch
            git lfs checkout

  - label: "test submodule LFS skipped when submodules disabled"
    command: ./test_git_lfs_checkout.sh . test_submodules_lfs_disabled
    plugins:
      - improbable-eng/metahook#v0.4.1:
          environment: |
            buildkite-agent env set "GIT_LFS_SKIP_SMUDGE=1"
          post-checkout: |
            echo "--- git lfs fetch + checkout (no submodule LFS)"
            cd $${BUILDKITE_BUILD_CHECKOUT_PATH}
            git lfs install --local
            git lfs fetch
            git lfs checkout

  - label: "test submodule LFS install + fetch + checkout per submodule"
    command: ./test_git_lfs_checkout.sh . test_submodules_with_lfs
    plugins:
      - improbable-eng/metahook#v0.4.1:
          environment: |
            buildkite-agent env set "GIT_LFS_SKIP_SMUDGE=1"
          post-checkout: |
            echo "--- git lfs fetch + checkout for repo and each submodule"
            cd $${BUILDKITE_BUILD_CHECKOUT_PATH}
            git lfs install --local
            git lfs fetch
            git lfs checkout
            git submodule foreach --quiet --recursive pwd | while IFS= read -r sub; do
              git -C "$sub" lfs install --local
              git -C "$sub" lfs fetch
              git -C "$sub" lfs checkout
            done

  - label: "test submodule LFS recursive enumeration"
    command: ./test_git_lfs_checkout.sh . test_submodules_lfs_nested
    plugins:
      - improbable-eng/metahook#v0.4.1:
          environment: |
            buildkite-agent env set "GIT_LFS_SKIP_SMUDGE=1"
          post-checkout: |
            echo "--- git lfs fetch + checkout for repo and all nested submodules"
            cd $${BUILDKITE_BUILD_CHECKOUT_PATH}
            git lfs install --local
            git lfs fetch
            git lfs checkout
            git submodule foreach --quiet --recursive pwd | while IFS= read -r sub; do
              git -C "$sub" lfs install --local
              git -C "$sub" lfs fetch
              git -C "$sub" lfs checkout
            done

  - label: "test prune disabled by default — HEAD objects intact"
    command: ./test_git_lfs_checkout.sh . test_prune_default_disabled
    plugins:
      - improbable-eng/metahook#v0.4.1:
          environment: |
            buildkite-agent env set "GIT_LFS_SKIP_SMUDGE=1"
          post-checkout: |
            echo "--- git lfs fetch + git lfs checkout (no prune)"
            cd $${BUILDKITE_BUILD_CHECKOUT_PATH}
            git lfs install --local
            git lfs fetch
            git lfs checkout
